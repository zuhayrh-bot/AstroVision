<!doctype html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='manifest' href='manifest.json'><style>body{margin:0;background:#000;color:white;font-family:Arial}video,canvas{width:100vw;height:100vh;object-fit:cover}#s{position:fixed;top:20px;left:20px;background:#000;padding:10px}button{position:fixed;bottom:30px;left:50%;width:80px;height:80px}</style></head><body><div id='s'>Loading</div><video id='v' autoplay playsinline></video><canvas id='c'></canvas><button id='b'>📷</button><script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js');const v=document.getElementById('v'),c=document.getElementById('c'),x=c.getContext('2d'),s=document.getElementById('s');let ok=false;async function init(){try{v.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});await new Promise(r=>v.onloadedmetadata=r);await v.play();c.width=v.videoWidth;c.height=v.videoHeight;ok=true;s.innerText='Ready';draw()}catch(e){s.innerText=e.message}}function draw(){if(ok)x.drawImage(v,0,0,c.width,c.height);requestAnimationFrame(draw)}async function cap(){if(!ok)return;s.innerText='Capturing';let t=document.createElement('canvas'),n=10;t.width=c.width/2;t.height=c.height/2;let q=t.getContext('2d'),arr=[];for(let i=0;i<n;i++){s.innerText='Capturing '+(i+1)+'/'+n;q.drawImage(v,0,0,t.width,t.height);arr.push(q.getImageData(0,0,t.width,t.height));await new Promise(r=>setTimeout(r,80))}s.innerText='Stacking';let o=q.createImageData(t.width,t.height);for(let i=0;i<o.data.length;i+=4){let a=0,b=0,d=0;arr.forEach(f=>{a+=f.data[i];b+=f.data[i+1];d+=f.data[i+2]});o.data[i]=a/n;o.data[i+1]=b/n;o.data[i+2]=d/n;o.data[i+3]=255}q.putImageData(o,0,0);x.drawImage(t,0,0,c.width,c.height);s.innerText='Done'}document.getElementById('b').onclick=cap;init()</script></body></html>
