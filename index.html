<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ZedAych AstroVision</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#02040a">
<style>
  :root{
    --bg:#02040a;
    --accent:#7fd8ff;
    --accent2:#a78bfa;
    --warn:#ffd166;
    --good:#6dffb3;
    --glass:rgba(10,14,26,0.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    background:var(--bg);overflow:hidden;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#e8f2ff;
    touch-action:none;
  }
  #stage{
    position:fixed;inset:0;width:100%;height:100%;
    background:#000;
  }
  #video{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;opacity:0; /* raw feed hidden, we draw processed frames to canvas */
  }
  #view{
    position:absolute;inset:0;width:100%;height:100%;
    display:block;
  }
  /* starfield-style scanning overlay shown before camera resolves */
  #boot{
    position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%, #0b1330 0%, #02040a 70%);
    z-index:50;gap:14px;text-align:center;padding:24px;
  }
  #boot h1{font-size:20px;font-weight:600;letter-spacing:0.5px;margin:0;color:var(--accent);}
  #boot p{margin:0;color:#9fb3d6;font-size:13px;max-width:280px;line-height:1.5;}
  .spinner{
    width:46px;height:46px;border-radius:50%;
    border:2px solid rgba(127,216,255,0.18);
    border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* top status bar */
  #topbar{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 0 14px;
    z-index:20;pointer-events:none;
  }
  .pill{
    pointer-events:auto;
    background:var(--glass);backdrop-filter:blur(10px);
    border:1px solid rgba(127,216,255,0.25);
    border-radius:999px;padding:7px 13px;
    font-size:12px;font-weight:600;letter-spacing:0.3px;
    display:flex;align-items:center;gap:6px;
    transition:all .25s ease;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .dot.scan{animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.4;transform:scale(0.8);}50%{opacity:1;transform:scale(1.15);}}

  #modeBadge{font-size:11px;color:#9fb3d6;}
  #modeBadge b{color:var(--accent);}

  /* center status toast (Scanning sky.../Stars detected/Enhancing...) */
  #toast{
    position:fixed;top:14%;left:50%;transform:translateX(-50%) translateY(-6px);
    z-index:20;background:var(--glass);backdrop-filter:blur(10px);
    border:1px solid rgba(127,216,255,0.25);border-radius:14px;
    padding:8px 16px;font-size:13px;font-weight:500;color:var(--accent);
    opacity:0;transition:opacity .35s ease, transform .35s ease;
    pointer-events:none;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* star ID label */
  #idLabel{
    position:fixed;top:22%;left:50%;transform:translateX(-50%);
    z-index:19;background:rgba(167,139,250,0.16);
    border:1px solid rgba(167,139,250,0.45);border-radius:12px;
    padding:7px 14px;font-size:12.5px;color:#d9ccff;
    opacity:0;transition:opacity .4s ease;pointer-events:none;
  }
  #idLabel.show{opacity:1;}

  /* zoom readout */
  #zoomReadout{
    position:fixed;left:50%;bottom:128px;transform:translateX(-50%);
    z-index:20;background:var(--glass);border-radius:999px;padding:4px 12px;
    font-size:12px;color:#cfe3ff;opacity:0;transition:opacity .25s ease;
    pointer-events:none;
  }
  #zoomReadout.show{opacity:1;}

  /* bottom controls */
  #bottombar{
    position:fixed;left:0;right:0;bottom:0;
    padding:0 22px calc(env(safe-area-inset-bottom,0px) + 22px) 22px;
    display:flex;align-items:center;justify-content:center;
    z-index:20;
  }
  #captureBtn{
    width:78px;height:78px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffffff, #c9e8ff 55%, #7fd8ff 100%);
    border:4px solid rgba(127,216,255,0.35);
    box-shadow:0 0 22px rgba(127,216,255,0.45),0 4px 18px rgba(0,0,0,0.5);
    position:relative;
  }
  #captureBtn:active{transform:scale(0.92);}
  #captureBtn.busy{animation:capPulse 1s ease-in-out infinite;}
  @keyframes capPulse{0%,100%{box-shadow:0 0 22px rgba(127,216,255,0.45);}50%{box-shadow:0 0 38px rgba(127,216,255,0.85);}}

  .sidebtn{
    position:absolute;width:46px;height:46px;border-radius:50%;
    background:var(--glass);border:1px solid rgba(127,216,255,0.25);
    display:flex;align-items:center;justify-content:center;font-size:18px;
  }
  #infoBtn{right:24px;bottom:calc(env(safe-area-inset-bottom,0px) + 46px);}
  #flipBtn{left:24px;bottom:calc(env(safe-area-inset-bottom,0px) + 46px);}

  /* result viewer after a stacked capture */
  #resultWrap{
    position:fixed;inset:0;z-index:60;background:#000;
    display:none;flex-direction:column;
  }
  #resultWrap.show{display:flex;}
  #resultCanvasWrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #resultCanvas{max-width:100%;max-height:100%;}
  #resultBar{
    padding:14px 18px calc(env(safe-area-inset-bottom,0px) + 18px) 18px;
    display:flex;gap:10px;justify-content:center;background:#04060c;
  }
  .actionBtn{
    flex:1;max-width:170px;padding:13px 10px;border-radius:14px;text-align:center;
    background:var(--glass);border:1px solid rgba(127,216,255,0.3);
    font-size:14px;font-weight:600;color:var(--accent);
  }
  .actionBtn.primary{background:linear-gradient(135deg,#3b8fd6,#7fd8ff);color:#021018;border:none;}
  #resultTitle{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);left:0;right:0;
    text-align:center;font-size:13px;color:#9fb3d6;z-index:61;
  }

  #permError{
    position:fixed;inset:0;z-index:70;background:var(--bg);display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center;
  }
  #permError.show{display:flex;}
  #permError h2{color:var(--warn);font-size:18px;margin:0;}
  #permError p{color:#9fb3d6;font-size:13.5px;line-height:1.6;max-width:300px;margin:0;}
  #permError button{margin-top:8px;padding:12px 22px;border-radius:12px;border:none;background:var(--accent);color:#021018;font-weight:700;font-size:14px;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <filter id="sharpenLow" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feConvolveMatrix order="3" preserveAlpha="true"
        kernelMatrix="0 -0.5 0  -0.5 3 -0.5  0 -0.5 0"/>
    </filter>
    <filter id="sharpenHigh" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.35" result="denoised"/>
      <feConvolveMatrix in="denoised" order="3" preserveAlpha="true"
        kernelMatrix="-0.3 -1 -0.3  -1 6.6 -1  -0.3 -1 -0.3"/>
    </filter>
  </defs>
</svg>

<div id="boot">
  <div class="spinner"></div>
  <h1>ZedAych AstroVision</h1>
  <p id="bootMsg">Initializing AI telescope camera…</p>
</div>

<div id="permError">
  <h2 id="permErrTitle">Camera access needed</h2>
  <p id="permErrMsg">AstroVision needs your camera to see the sky. Allow camera access in your browser, then reload.</p>
  <button onclick="location.reload()">Try Again</button>
</div>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="view"></canvas>
</div>

<div id="topbar">
  <div class="pill"><span class="dot scan" id="statusDot"></span><span id="statusText">Scanning sky…</span></div>
  <div class="pill" id="modeBadge">Mode: <b id="modeText">—</b></div>
</div>

<div id="toast"></div>
<div id="idLabel"></div>
<div id="zoomReadout" id="zoomReadout">1.0×</div>

<div id="bottombar">
  <button class="sidebtn" id="flipBtn" title="Flip camera">⟲</button>
  <button id="captureBtn" title="Capture enhanced AI stack"></button>
  <button class="sidebtn" id="infoBtn" title="Info">ⓘ</button>
</div>

<div id="resultWrap">
  <div id="resultTitle">AI Stacked Capture</div>
  <div id="resultCanvasWrap"><canvas id="resultCanvas"></canvas></div>
  <div id="resultBar">
    <button class="actionBtn" id="discardBtn">Discard</button>
    <button class="actionBtn primary" id="saveBtn">Save Photo</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------------------------------------------------------------
     ZedAych AstroVision — single-file AI night-sky camera
     Pipeline: getUserMedia -> per-frame canvas enhancement (mode-aware) ->
     periodic scene analysis (star/moon/galaxy/normal detection) ->
     pinch-to-zoom AI crop+upscale -> multi-frame stack capture ->
     unsharp-mask + denoise on the stacked result ->
     optional star identification using GPS + compass + alt/az astronomy math.
  --------------------------------------------------------------------- */

  const video      = document.getElementById('video');
  const view       = document.getElementById('view');
  const vctx       = view.getContext('2d', {willReadFrequently:false});
  const boot       = document.getElementById('boot');
  const bootMsg    = document.getElementById('bootMsg');
  const permError  = document.getElementById('permError');
  const statusText = document.getElementById('statusText');
  const statusDot  = document.getElementById('statusDot');
  const modeText   = document.getElementById('modeText');
  const toast      = document.getElementById('toast');
  const idLabel    = document.getElementById('idLabel');
  const zoomReadout= document.getElementById('zoomReadout');
  const captureBtn = document.getElementById('captureBtn');
  const flipBtn    = document.getElementById('flipBtn');
  const infoBtn    = document.getElementById('infoBtn');
  const resultWrap = document.getElementById('resultWrap');
  const resultCanvas = document.getElementById('resultCanvas');
  const discardBtn = document.getElementById('discardBtn');
  const saveBtn    = document.getElementById('saveBtn');

  let stream = null;
  let track  = null;
  let facingMode = 'environment';
  let videoW = 0, videoH = 0;
  let dpr = Math.min(window.devicePixelRatio || 1, 2);

  // ---- zoom state ----
  let zoom = 1.0;
  const MIN_ZOOM = 1.0, MAX_ZOOM = 12.0;
  let pinchStartDist = null, pinchStartZoom = 1;

  // ---- scene/mode state ----
  const MODES = {
    NORMAL:  {label:'Normal',          filter:'contrast(1.04) brightness(1.0) saturate(1.02)'},
    NIGHT:   {label:'Night Vision',    filter:'brightness(1.45) contrast(1.28) saturate(0.95)'},
    STAR:    {label:'Star Mode',       filter:'brightness(1.7) contrast(1.55) saturate(0.6)'},
    GALAXY:  {label:'Galaxy / Milky Way', filter:'brightness(1.95) contrast(1.4) saturate(0.85)'},
    MOON:    {label:'Moon Mode',       filter:'brightness(0.85) contrast(1.6) saturate(1.0)'}
  };
  let currentMode = 'NORMAL';
  let lastStarCount = 0;

  // ===================================================================
  // 1. CAMERA INIT
  // ===================================================================
  const permErrTitle = document.getElementById('permErrTitle');
  const permErrMsg    = document.getElementById('permErrMsg');

  function showPermError(title, msg){
    boot.style.display='none';
    permErrTitle.textContent = title;
    permErrMsg.textContent = msg;
    permError.classList.add('show');
  }

  // Progressively-better capture resolutions to try. Higher resolution
  // gives the AI zoom/stack pipeline more real pixel detail to work with,
  // but not every mid-range sensor/driver supports 4K capture, so we fall
  // back gracefully.
  const RES_CHAIN = [
    {width:{ideal:3840}, height:{ideal:2160}},
    {width:{ideal:2560}, height:{ideal:1440}},
    {width:{ideal:1920}, height:{ideal:1080}},
    {width:{ideal:1280}, height:{ideal:720}}
  ];

  async function startCamera(){
    // --- secure-context check FIRST: this is the #1 cause of an instant,
    // silent failure with no permission prompt at all. getUserMedia is
    // blocked outright on pages opened directly from local storage —
    // this includes file:// (opened via a file manager) AND content://
    // (what Chrome uses when you open a file straight from its own
    // Downloads screen), plus plain http://. None of these let Chrome
    // show the camera permission prompt at all; it just fails instantly
    // and gets reported as "denied" even though no prompt ever appeared.
    const proto = location.protocol;
    const isLocalhost = proto === 'http:' && /^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname);
    const isHttps = proto === 'https:';
    if(!isHttps && !isLocalhost){
      const schemeNote = proto === 'file:'
        ? 'It\u2019s opening directly from your phone\u2019s storage (file://...).'
        : proto === 'content:'
          ? 'It\u2019s opening from Chrome\u2019s own Downloads screen (content://...) \u2014 tapping a downloaded file there does this automatically.'
          : `It\u2019s opening over ${proto.replace(':','')} instead of https://.`;
      showPermError(
        'Can\u2019t access camera from a local file',
        `${schemeNote} Chrome blocks camera access entirely outside of https:// pages \u2014 it never even shows the permission prompt, it just fails instantly. Host this file somewhere with https:// (e.g. GitHub Pages, or drag-and-drop it onto netlify.com/drop for an instant link, no account needed) and open it from that https:// link instead \u2014 don\u2019t open it from Downloads or a file manager. Once it\u2019s served over https://, the permission prompt will appear normally.`
      );
      return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showPermError(
        'Camera API unavailable',
        'This browser doesn\u2019t expose camera access on this page. Make sure you\u2019re using an up-to-date Chrome and opening the app via an https:// link.'
      );
      return;
    }

    boot.style.display='flex';
    let lastErr = null;
    for(const res of RES_CHAIN){
      try{
        bootMsg.textContent = 'Requesting camera access…';
        const constraints = {
          audio:false,
          video:Object.assign({facingMode:{ideal:facingMode}, frameRate:{ideal:30,max:30}}, res)
        };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        lastErr = null;
        break;
      }catch(err){
        lastErr = err;
        // NotAllowedError / SecurityError means the user (or browser policy)
        // said no — retrying at a lower resolution won't help, stop here.
        if(err.name === 'NotAllowedError' || err.name === 'SecurityError') break;
        // OverconstrainedError / NotReadableError: try the next, lower
        // resolution in the chain (sensor may not support the higher mode).
      }
    }

    if(!stream){
      console.error(lastErr);
      const name = lastErr && lastErr.name;
      if(name === 'NotAllowedError'){
        showPermError('Camera permission denied', 'You (or the browser) denied camera access. On Android Chrome: tap the lock/info icon in the address bar \u2192 Permissions \u2192 Camera \u2192 Allow, then reload. If Chrome never showed a prompt at all, this page is likely not being served over https:// \u2014 see below.');
      } else if(name === 'NotFoundError'){
        showPermError('No camera found', 'The browser couldn\u2019t find a usable camera on this device.');
      } else if(name === 'NotReadableError'){
        showPermError('Camera is busy', 'Another app is currently using the camera. Close other camera apps and try again.');
      } else {
        showPermError('Camera access needed', 'AstroVision needs your camera to see the sky. Allow camera access in your browser, then reload.');
      }
      return;
    }

    video.srcObject = stream;
    track = stream.getVideoTracks()[0];

    // Helper: race any promise against a timeout so a single flaky device
    // API call can never hang the app forever on the boot screen.
    function withTimeout(promise, ms){
      return Promise.race([
        Promise.resolve(promise),
        new Promise(res=>setTimeout(res, ms))
      ]);
    }

    // Try to hand exposure/focus/white-balance control to the device's
    // continuous auto modes — we never expose manual controls to the user,
    // the app always decides. Some Android camera drivers let this promise
    // hang indefinitely, so it's time-boxed rather than fully awaited.
    try{
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      const adv = [];
      if(caps.focusMode && caps.focusMode.includes('continuous')) adv.push({focusMode:'continuous'});
      if(caps.exposureMode && caps.exposureMode.includes('continuous')) adv.push({exposureMode:'continuous'});
      if(caps.whiteBalanceMode && caps.whiteBalanceMode.includes('continuous')) adv.push({whiteBalanceMode:'continuous'});
      if(adv.length) await withTimeout(track.applyConstraints({advanced:adv}), 1200);
    }catch(e){ /* not all devices expose this — software enhancement covers the gap */ }

    bootMsg.textContent = 'Starting preview…';
    await withTimeout(new Promise(res=>{
      video.onloadedmetadata = ()=>{ video.play().catch(()=>{}); res(); };
    }), 6000);

    // Belt-and-suspenders: even if the metadata event never fired (some
    // devices miss it), videoWidth/videoHeight may already be populated —
    // poll briefly before giving up.
    videoW = video.videoWidth; videoH = video.videoHeight;
    if(!videoW || !videoH){
      video.play().catch(()=>{});
      for(let i=0; i<20 && (!video.videoWidth || !video.videoHeight); i++){
        await new Promise(r=>setTimeout(r,150));
      }
      videoW = video.videoWidth; videoH = video.videoHeight;
    }
    if(!videoW || !videoH){
      showPermError(
        'Camera connected but no picture',
        'Permission was granted and a camera stream was created, but no video frames ever arrived. This is usually a one-off glitch \u2014 fully close this browser tab (not just refresh) and reopen the link. If it keeps happening, another app may be holding the camera open in the background.'
      );
      return;
    }
    resizeCanvas();
    boot.style.display='none';
    requestAnimationFrame(renderLoop);
    startAnalysisLoop();
    startOrientationTracking();
  }

  function resizeCanvas(){
    view.width  = Math.floor(window.innerWidth * dpr);
    view.height = Math.floor(window.innerHeight * dpr);
    view.style.width = window.innerWidth+'px';
    view.style.height = window.innerHeight+'px';
  }
  window.addEventListener('resize', resizeCanvas);

  // ===================================================================
  // 2. PER-FRAME RENDER LOOP — this is the "smart zoom" + live enhancement
  // ===================================================================
  function renderLoop(){
    if(videoW && videoH){
      const cw = view.width, ch = view.height;
      // source crop driven by zoom (cropping tighter + scaling up = AI telescope zoom)
      const cropW = videoW / zoom;
      const cropH = videoH / zoom;
      const sx = (videoW - cropW) / 2;
      const sy = (videoH - cropH) / 2;

      vctx.imageSmoothingEnabled = true;
      vctx.imageSmoothingQuality = 'high';
      // GPU sharpen ramps up with zoom — at high zoom the upscaled image
      // softens, so a stronger convolution sharpen compensates and keeps
      // star points looking crisp instead of mushy.
      const sharpen = zoom > 3.5 ? 'url(#sharpenHigh) ' : (zoom > 1.3 ? 'url(#sharpenLow) ' : '');
      vctx.filter = sharpen + MODES[currentMode].filter;
      vctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, cw, ch);
      vctx.filter = 'none';
    }
    requestAnimationFrame(renderLoop);
  }

  // ===================================================================
  // 3. SCENE ANALYSIS — night sky / star / moon / galaxy detection
  //    Runs on a small downscaled offscreen canvas so it stays cheap.
  // ===================================================================
  const analysisCanvas = document.createElement('canvas');
  const aCtx = analysisCanvas.getContext('2d', {willReadFrequently:true});
  const A_W = 160, A_H = 90;
  analysisCanvas.width = A_W; analysisCanvas.height = A_H;

  function startAnalysisLoop(){
    setInterval(analyzeScene, 700);
  }

  function analyzeScene(){
    if(!videoW) return;
    aCtx.drawImage(video, 0, 0, A_W, A_H);
    let data;
    try{ data = aCtx.getImageData(0,0,A_W,A_H).data; }catch(e){ return; }

    const n = A_W*A_H;
    const lum = new Float32Array(n);
    const hist = new Uint32Array(256);
    let sum = 0;
    for(let i=0,p=0; p<data.length; p+=4,i++){
      const l = 0.299*data[p] + 0.587*data[p+1] + 0.114*data[p+2];
      lum[i] = l; sum += l; hist[l|0]++;
    }
    const avgLum = sum / n;

    // Adaptive bright-point threshold: top ~1% of pixels in THIS frame,
    // rather than a fixed magic number — this holds up across different
    // sensors, ambient light pollution, and lens quality.
    const target = Math.max(4, Math.floor(n*0.01));
    let cum = 0, thresh = 255;
    for(let v=255; v>=0; v--){ cum += hist[v]; if(cum >= target){ thresh = v; break; } }
    thresh = Math.max(thresh, avgLum + 35);

    // True star-point count via local-maxima detection (a pixel brighter
    // than all 8 neighbors), instead of raw bright-pixel ratio — this
    // stops one large bright blob (the moon, a streetlight) from being
    // miscounted as dozens of "stars".
    let starPoints = 0, massPixels = 0;
    for(let y=1; y<A_H-1; y++){
      for(let x=1; x<A_W-1; x++){
        const idx = y*A_W + x;
        const v = lum[idx];
        if(v > 235) massPixels++;
        if(v < thresh) continue;
        let isMax = true;
        for(let dy=-1; dy<=1 && isMax; dy++){
          for(let dx=-1; dx<=1; dx++){
            if(dx===0 && dy===0) continue;
            if(lum[idx + dy*A_W + dx] > v){ isMax = false; break; }
          }
        }
        if(isMax) starPoints++;
      }
    }
    const massRatio = massPixels / n;

    let mode = 'NORMAL';
    let status = 'Scanning sky…';
    lastStarCount = starPoints;

    if(avgLum < 18){
      if(massRatio > 0.05){
        mode = 'MOON';
        status = 'Bright object detected — Moon Mode';
      } else if(starPoints > 28){
        mode = 'GALAXY';
        status = `Dense star field (${starPoints}+) — Galaxy enhancement active`;
      } else if(starPoints > 2){
        mode = 'STAR';
        status = `Stars detected (${starPoints})`;
      } else {
        mode = 'NIGHT';
        status = 'Low light — Night Vision active';
      }
    } else if(avgLum < 60){
      mode = 'NIGHT';
      status = 'Dim scene — Night Vision active';
    } else {
      mode = 'NORMAL';
      status = 'Daylight scene';
    }

    if(mode !== currentMode){
      currentMode = mode;
      modeText.textContent = MODES[mode].label;
      showToast(status);
    }
    statusText.textContent = status;
    statusDot.classList.toggle('scan', mode==='NORMAL');
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove('show'), 2200);
  }

  // ===================================================================
  // 4. PINCH-TO-ZOOM (AI telescope zoom — no native optical zoom needed)
  // ===================================================================
  function dist(t0,t1){
    const dx=t0.clientX-t1.clientX, dy=t0.clientY-t1.clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }
  view.addEventListener('touchstart', e=>{
    if(e.touches.length===2){
      pinchStartDist = dist(e.touches[0], e.touches[1]);
      pinchStartZoom = zoom;
    }
  }, {passive:true});
  view.addEventListener('touchmove', e=>{
    if(e.touches.length===2 && pinchStartDist){
      const d = dist(e.touches[0], e.touches[1]);
      const ratio = d / pinchStartDist;
      zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, pinchStartZoom * ratio));
      zoomReadout.textContent = zoom.toFixed(1)+'×';
      zoomReadout.classList.add('show');
      clearTimeout(view._zt);
      view._zt = setTimeout(()=>zoomReadout.classList.remove('show'), 900);
    }
  }, {passive:true});
  view.addEventListener('touchend', e=>{
    if(e.touches.length<2) pinchStartDist=null;
  }, {passive:true});
  // double-tap to reset zoom
  let lastTap=0;
  view.addEventListener('touchend', e=>{
    const now=Date.now();
    if(now-lastTap<280){ zoom=1.0; zoomReadout.textContent='1.0×'; zoomReadout.classList.add('show'); setTimeout(()=>zoomReadout.classList.remove('show'),700); }
    lastTap=now;
  });

  // ===================================================================
  // 5. AI FRAME STACKING CAPTURE — "lucky imaging"
  //    Captures a pool of frames, scores each for sharpness (handheld
  //    shake blurs some frames more than others), keeps only the
  //    sharpest subset, aligns them to a reference frame with a small
  //    shift search (compensates for hand tremor between frames), then
  //    averages the aligned set and runs contrast recovery + unsharp
  //    masking. This produces a noticeably cleaner result than simply
  //    averaging every frame including the shaky ones.
  // ===================================================================
  const lowEndDevice = (navigator.hardwareConcurrency || 4) <= 4;
  const POOL_SIZE = lowEndDevice ? 16 : 24; // frames sampled
  const KEEP_SIZE = lowEndDevice ? 7  : 10; // sharpest frames actually stacked
  const ALIGN_W = 160, ALIGN_H = 90;        // downsampled grid used for scoring + alignment
  const SEARCH = 4;                          // +/- px search window on the align grid

  let capturing = false;
  captureBtn.addEventListener('click', ()=>{
    if(capturing) return;
    runStackCapture();
  });

  function toGray(imgData){
    const d = imgData.data, n = imgData.width*imgData.height;
    const g = new Float32Array(n);
    for(let i=0,p=0;p<d.length;p+=4,i++) g[i] = 0.299*d[p]+0.587*d[p+1]+0.114*d[p+2];
    return g;
  }
  // simple discrete Laplacian energy = sharpness score (more high-frequency
  // detail surviving = less motion blur on that frame)
  function sharpnessScore(gray, w, h){
    let energy = 0;
    for(let y=1;y<h-1;y++){
      for(let x=1;x<w-1;x++){
        const i = y*w+x;
        const lap = 4*gray[i] - gray[i-1] - gray[i+1] - gray[i-w] - gray[i+w];
        energy += lap*lap;
      }
    }
    return energy;
  }
  // small-window shift search: returns {dx,dy} that best aligns `gray`
  // onto `ref` (both ALIGN_W x ALIGN_H), minimizing sum of abs differences
  function findShift(ref, gray, w, h){
    let bestDx=0, bestDy=0, bestScore=Infinity;
    const margin = SEARCH+1;
    for(let dy=-SEARCH; dy<=SEARCH; dy++){
      for(let dx=-SEARCH; dx<=SEARCH; dx++){
        let diff = 0;
        for(let y=margin; y<h-margin; y+=2){
          for(let x=margin; x<w-margin; x+=2){
            diff += Math.abs(ref[y*w+x] - gray[(y+dy)*w+(x+dx)]);
          }
        }
        if(diff < bestScore){ bestScore=diff; bestDx=dx; bestDy=dy; }
      }
    }
    return {dx:bestDx, dy:bestDy};
  }

  async function runStackCapture(){
    capturing = true;
    captureBtn.classList.add('busy');
    statusDot.classList.add('scan');

    const cropW = videoW / zoom, cropH = videoH / zoom;
    const sx = (videoW-cropW)/2, sy=(videoH-cropH)/2;
    const outW = Math.min(1280, cropW|0);
    const outH = Math.round(outW * (cropH/cropW));

    const fullCanvas = document.createElement('canvas');
    fullCanvas.width = outW; fullCanvas.height = outH;
    const fullCtx = fullCanvas.getContext('2d', {willReadFrequently:true});

    const alignCanvas = document.createElement('canvas');
    alignCanvas.width = ALIGN_W; alignCanvas.height = ALIGN_H;
    const alignCtx = alignCanvas.getContext('2d', {willReadFrequently:true});

    // --- pool capture: keep only the KEEP_SIZE sharpest frames seen ---
    const kept = []; // {score, full:ImageData, gray:Float32Array}
    for(let i=0;i<POOL_SIZE;i++){
      fullCtx.drawImage(video, sx, sy, cropW, cropH, 0, 0, outW, outH);
      alignCtx.drawImage(fullCanvas, 0, 0, ALIGN_W, ALIGN_H);
      const grayData = alignCtx.getImageData(0,0,ALIGN_W,ALIGN_H);
      const gray = toGray(grayData);
      const score = sharpnessScore(gray, ALIGN_W, ALIGN_H);

      if(kept.length < KEEP_SIZE){
        kept.push({score, gray, full:fullCtx.getImageData(0,0,outW,outH)});
        kept.sort((a,b)=>a.score-b.score); // ascending, worst first
      } else if(score > kept[0].score){
        kept[0] = {score, gray, full:fullCtx.getImageData(0,0,outW,outH)};
        kept.sort((a,b)=>a.score-b.score);
      }
      statusText.textContent = `Capturing ${i+1}/${POOL_SIZE}…`;
      await new Promise(r=>requestAnimationFrame(r));
    }

    kept.sort((a,b)=>b.score-a.score); // sharpest first
    const reference = kept[0];

    statusText.textContent = 'Aligning frames…';
    await new Promise(r=>setTimeout(r,20));
    const scaleX = outW/ALIGN_W, scaleY = outH/ALIGN_H;
    const shifts = kept.map((f,idx)=>{
      if(idx===0) return {dx:0,dy:0};
      const s = findShift(reference.gray, f.gray, ALIGN_W, ALIGN_H);
      return {dx: Math.round(s.dx*scaleX), dy: Math.round(s.dy*scaleY)};
    });

    statusText.textContent = 'Stacking…';
    await new Promise(r=>setTimeout(r,20));

    const acc = new Float32Array(outW*outH*3);
    for(let f=0; f<kept.length; f++){
      const d = kept[f].full.data;
      const {dx,dy} = shifts[f];
      for(let y=0;y<outH;y++){
        let srcY = y - dy;
        srcY = srcY<0?0:(srcY>=outH?outH-1:srcY);
        for(let x=0;x<outW;x++){
          let srcX = x - dx;
          srcX = srcX<0?0:(srcX>=outW?outW-1:srcX);
          const sIdx = (srcY*outW+srcX)*4;
          const aIdx = (y*outW+x)*3;
          acc[aIdx]   += d[sIdx];
          acc[aIdx+1] += d[sIdx+1];
          acc[aIdx+2] += d[sIdx+2];
        }
      }
    }

    statusText.textContent = 'Enhancing…';
    await new Promise(r=>setTimeout(r,20));

    const frames = kept.length;
    const out = fullCtx.createImageData(outW,outH);
    for(let p=0, j=0; p<out.data.length; p+=4, j+=3){
      out.data[p]   = acc[j]/frames;
      out.data[p+1] = acc[j+1]/frames;
      out.data[p+2] = acc[j+2]/frames;
      out.data[p+3] = 255;
    }

    // Tone-map + gently sharpen the stacked result. This replaced an
    // earlier hard min/max contrast stretch that clipped smooth gradients
    // (e.g. moonlight diffused through cloud) into stark black/white
    // shapes with hard edges — fine for isolated stars on a black sky, but
    // destructive on any scene with continuous brightness gradients.
    toneMap(out, currentMode);
    const sharpened = unsharpMask(out, outW, outH, currentMode==='MOON'?0.55:0.45, 4);

    resultCanvas.width = outW; resultCanvas.height = outH;
    resultCanvas.getContext('2d').putImageData(sharpened, 0, 0);

    capturing = false;
    captureBtn.classList.remove('busy');
    statusText.textContent = 'Scanning sky…';
    resultWrap.classList.add('show');
  }

  // Percentile-based tone curve: instead of stretching to the frame's true
  // min/max (which lets a single bright blob like a diffused moon force
  // everything else to clip to pure white/black), this clips only the
  // extreme ~1% of pixels on each end and applies a soft gamma lift in
  // between — preserving cloud texture and gradient instead of turning it
  // into a flat, hard-edged shape.
  function toneMap(imgData, mode){
    const d = imgData.data;
    const n = d.length/4;
    const hist = new Uint32Array(256);
    for(let i=0;i<d.length;i+=4){
      const l = 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      hist[l|0]++;
    }
    const lowTarget = n*0.010, highTarget = n*0.995;
    let cum=0, lo=0, hi=255;
    for(let v=0; v<256; v++){ cum+=hist[v]; if(cum>=lowTarget){ lo=v; break; } }
    cum=0;
    for(let v=255; v>=0; v--){ cum+=hist[v]; if(cum>=(n-highTarget)){ hi=v; break; } }
    if(hi-lo < 40){ hi = Math.min(255, lo+40); } // guard against an already-flat frame over-amplifying noise
    const range = Math.max(1, hi-lo);

    // gentle shadow lift, mode-tuned: star/galaxy modes want faint detail
    // pulled up a bit more; moon mode wants to stay mostly true-to-source
    // since it's already bright and detail lives in the mid/highlights.
    const gamma = mode==='MOON' ? 0.96 : (mode==='STAR' || mode==='GALAXY' ? 0.82 : 0.90);

    for(let i=0;i<d.length;i+=4){
      for(let c=0;c<3;c++){
        let t = (d[i+c]-lo)/range;
        t = t<0?0:(t>1?1:t);
        t = Math.pow(t, gamma);
        d[i+c] = t*255;
      }
    }
  }

  // simple 3x3 unsharp mask: result = original + amount*(original - blurred),
  // gated by a threshold so it only sharpens real edges (stars, moon
  // terminator, tree/roof silhouettes) and leaves smooth sky/cloud
  // gradients alone instead of amplifying them into hard ringing edges.
  function unsharpMask(imgData, w, h, amount, threshold){
    threshold = threshold || 0;
    const src = imgData.data;
    const blurred = boxBlur3(src, w, h);
    const out = new Uint8ClampedArray(src.length);
    for(let i=0;i<src.length;i+=4){
      for(let c=0;c<3;c++){
        const orig = src[i+c], bl = blurred[i+c];
        const diff = orig-bl;
        let v = Math.abs(diff) > threshold ? orig + amount*diff : orig;
        out[i+c] = v<0?0:(v>255?255:v);
      }
      out[i+3]=255;
    }
    return new ImageData(out, w, h);
  }
  function boxBlur3(src, w, h){
    const out = new Uint8ClampedArray(src.length);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        let r=0,g=0,b=0,cnt=0;
        for(let dy=-1;dy<=1;dy++){
          for(let dx=-1;dx<=1;dx++){
            const nx=x+dx, ny=y+dy;
            if(nx<0||ny<0||nx>=w||ny>=h) continue;
            const idx=(ny*w+nx)*4;
            r+=src[idx]; g+=src[idx+1]; b+=src[idx+2]; cnt++;
          }
        }
        const o=(y*w+x)*4;
        out[o]=r/cnt; out[o+1]=g/cnt; out[o+2]=b/cnt; out[o+3]=255;
      }
    }
    return out;
  }

  discardBtn.addEventListener('click', ()=> resultWrap.classList.remove('show'));
  saveBtn.addEventListener('click', ()=>{
    const a = document.createElement('a');
    a.download = `AstroVision_${Date.now()}.png`;
    a.href = resultCanvas.toDataURL('image/png');
    a.click();
  });

  // ===================================================================
  // 6. CAMERA FLIP
  // ===================================================================
  flipBtn.addEventListener('click', async ()=>{
    facingMode = facingMode==='environment' ? 'user' : 'environment';
    if(stream) stream.getTracks().forEach(t=>t.stop());
    boot.style.display='flex';
    bootMsg.textContent='Switching camera…';
    await startCamera();
  });

  infoBtn.addEventListener('click', ()=>{
    showToast('Point at the sky · pinch to zoom · tap shutter to stack-capture');
  });

  // ===================================================================
  // 7. OPTIONAL: STAR / OBJECT IDENTIFICATION
  //    Uses GPS + compass heading + device tilt + local time to compute
  //    each catalog star's current altitude/azimuth, then matches against
  //    where the phone is roughly pointed.
  // ===================================================================
  const STAR_CATALOG = [
    {name:'Sirius',     ra:101.287, dec:-16.716},
    {name:'Canopus',    ra:95.988,  dec:-52.696},
    {name:'Arcturus',   ra:213.915, dec:19.182},
    {name:'Vega',       ra:279.234, dec:38.784},
    {name:'Capella',    ra:79.172,  dec:45.998},
    {name:'Rigel',      ra:78.634,  dec:-8.202},
    {name:'Procyon',    ra:114.825, dec:5.225},
    {name:'Betelgeuse', ra:88.793,  dec:7.407},
    {name:'Achernar',   ra:24.429,  dec:-57.237},
    {name:'Hadar',      ra:210.956, dec:-60.373},
    {name:'Altair',     ra:297.696, dec:8.868},
    {name:'Aldebaran',  ra:68.980,  dec:16.509},
    {name:'Antares',    ra:247.352, dec:-26.432},
    {name:'Spica',      ra:201.298, dec:-11.161},
    {name:'Pollux',     ra:116.329, dec:28.026},
    {name:'Fomalhaut',  ra:344.413, dec:-29.622},
    {name:'Deneb',      ra:310.358, dec:45.280},
    {name:'Regulus',    ra:152.093, dec:11.967},
    {name:'Castor',     ra:113.649, dec:31.888},
    {name:'Polaris',    ra:37.954,  dec:89.264}
  ];

  let geo = null;       // {lat, lon}
  let heading = null;   // degrees, 0 = North
  let tiltElev = null;  // rough elevation angle estimate

  function startOrientationTracking(){
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(
        pos=>{ geo = {lat:pos.coords.latitude, lon:pos.coords.longitude}; },
        ()=>{ /* identification simply stays off without location */ },
        {enableHighAccuracy:false, maximumAge:60000}
      );
    }
    const handleOrient = (e)=>{
      if(typeof e.webkitCompassHeading === 'number'){
        heading = e.webkitCompassHeading; // iOS Safari
      } else if(e.alpha !== null){
        heading = 360 - e.alpha; // best-effort compass on Android Chrome
      }
      if(typeof e.beta === 'number'){
        // beta≈90 when phone held upright pointing at horizon;
        // tilting further back raises the camera toward the sky.
        tiltElev = Math.max(-10, Math.min(90, e.beta - 90));
      }
    };
    if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
      // iOS 13+: needs a user gesture to grant — request on first tap
      const grant = ()=>{
        DeviceOrientationEvent.requestPermission().then(state=>{
          if(state==='granted') window.addEventListener('deviceorientation', handleOrient);
        }).catch(()=>{});
        window.removeEventListener('touchend', grant);
      };
      window.addEventListener('touchend', grant, {once:true});
    } else {
      window.addEventListener('deviceorientationabsolute', handleOrient);
      window.addEventListener('deviceorientation', handleOrient);
    }
    setInterval(tryIdentify, 2500);
  }

  function tryIdentify(){
    if(!geo || heading===null || tiltElev===null) return;
    if(currentMode==='NORMAL') { idLabel.classList.remove('show'); return; }

    const now = new Date();
    let best=null, bestDelta=999;
    for(const s of STAR_CATALOG){
      const {alt, az} = altAz(s.ra, s.dec, geo.lat, geo.lon, now);
      if(alt < 5) continue; // below horizon / not realistically visible
      const azDelta = angDelta(az, heading);
      const altDelta = Math.abs(alt - tiltElev);
      const total = azDelta + altDelta;
      if(total < bestDelta){ bestDelta = total; best = s; }
    }
    if(best && bestDelta < 25){
      idLabel.textContent = `Possible ${best.name} nearby`;
      idLabel.classList.add('show');
    } else {
      idLabel.classList.remove('show');
    }
  }

  function angDelta(a,b){
    let d = Math.abs(a-b)%360;
    return d>180 ? 360-d : d;
  }

  // Standard alt/az astronomy conversion from RA/Dec (deg, J2000-ish) +
  // observer lat/lon (deg) + JS Date -> {alt, az} in degrees.
  function altAz(raDeg, decDeg, latDeg, lonDeg, date){
    const JD = date.getTime()/86400000 + 2440587.5;
    const D = JD - 2451545.0;
    let GMST = 280.46061837 + 360.98564736629*D;
    GMST = ((GMST % 360)+360)%360;
    let LST = (GMST + lonDeg + 360) % 360;
    let HA = ((LST - raDeg)+360) % 360;
    const haRad = HA*Math.PI/180;
    const decRad = decDeg*Math.PI/180;
    const latRad = latDeg*Math.PI/180;

    const sinAlt = Math.sin(decRad)*Math.sin(latRad) + Math.cos(decRad)*Math.cos(latRad)*Math.cos(haRad);
    const alt = Math.asin(Math.max(-1,Math.min(1,sinAlt))) * 180/Math.PI;

    let cosAz = (Math.sin(decRad) - Math.sin(alt*Math.PI/180)*Math.sin(latRad)) /
                (Math.cos(alt*Math.PI/180)*Math.cos(latRad) || 1e-9);
    cosAz = Math.max(-1, Math.min(1, cosAz));
    let az = Math.acos(cosAz) * 180/Math.PI;
    if(Math.sin(haRad) > 0) az = 360 - az;

    return {alt, az};
  }

  // ===================================================================
  // GO
  // ===================================================================
  startCamera();

})();
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
