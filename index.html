<!DOCTYPE html>
<html>
 <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#02040a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ZedAych AstroVision v5</title>
<style>
html,body{margin:0;background:#000;color:#fff;font-family:Arial;overflow:hidden}
video,canvas{position:fixed;width:100%;height:100%;object-fit:cover}
video{opacity:0}
#ui{position:fixed;z-index:5;top:15px;left:15px;right:15px}
.box{background:#000c;border:1px solid #70dfff55;padding:12px;border-radius:15px;margin-bottom:8px;color:#8de7ff}
button{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);width:85px;height:85px;border-radius:50%;border:0;background:#8de7ff}
</style>
</head>
 <script>
if ("serviceWorker" in navigator) {
 navigator.serviceWorker.register("service-worker.js");
}
 </script>
 
<body>

<video id="cam" autoplay playsinline></video>
<canvas id="screen"></canvas>

<div id="ui">
<div class="box" id="status">Starting...</div>
<div class="box" id="stats"></div>
</div>

<button id="capture"></button>

<script>
const cam=document.getElementById("cam");
const canvas=document.getElementById("screen");
const ctx=canvas.getContext("2d",{willReadFrequently:true});
const status=document.getElementById("status");
const stats=document.getElementById("stats");

let W,H,frames=[];

async function start(){
 const stream=await navigator.mediaDevices.getUserMedia({
  video:{
   facingMode:"environment",
   width:{ideal:3840},
   height:{ideal:2160}
  }
 });

 cam.srcObject=stream;
 await new Promise(r=>cam.onloadedmetadata=r);
 await cam.play();

 W=cam.videoWidth;
 H=cam.videoHeight;

 canvas.width=W;
 canvas.height=H;

 status.textContent="AstroVision v5 ready";
 stats.innerHTML=`Sensor: ${W}x${H}<br>Engine: multi-frame`;

 preview();
}

function preview(){
 ctx.drawImage(cam,0,0,W,H);
 let img=ctx.getImageData(0,0,W,H);
 enhance(img,1.15);
 ctx.putImageData(img,0,0);
 requestAnimationFrame(preview);
}

function enhance(img,power){
 let d=img.data;
 for(let i=0;i<d.length;i+=4){
  for(let c=0;c<3;c++){
   let v=d[i+c]/255;
   v=Math.pow(v,.65)*255*power;
   d[i+c]=Math.max(0,Math.min(255,v));
  }
 }
}

function scoreFrame(img){
 let d=img.data;
 let score=0;
 for(let i=4;i<d.length-4;i+=16){
  score+=Math.abs(d[i]-d[i-4]);
 }
 return score;
}

function findShift(a,b){
 let best={x:0,y:0,s:Infinity};

 for(let y=-3;y<=3;y++){
  for(let x=-3;x<=3;x++){
   let diff=0;
   for(let py=10;py<H-10;py+=20){
    for(let px=10;px<W-10;px+=20){
     let a1=((py*W+px)*4);
     let bx=Math.min(W-1,Math.max(0,px+x));
     let by=Math.min(H-1,Math.max(0,py+y));
     let b1=((by*W+bx)*4);
     diff+=Math.abs(a.data[a1]-b.data[b1]);
    }
   }
   if(diff<best.s) best={x,y,s:diff};
  }
 }
 return best;
}

async function captureStack(){

frames=[];

status.textContent="Capturing frames...";

for(let i=0;i<100;i++){
 let c=document.createElement("canvas");
 c.width=W;c.height=H;
 let cctx=c.getContext("2d");
 cctx.drawImage(cam,0,0,W,H);
 let img=cctx.getImageData(0,0,W,H);
 frames.push({img,score:scoreFrame(img)});
 await new Promise(r=>setTimeout(r,40));
}

frames.sort((a,b)=>b.score-a.score);
frames=frames.slice(0,50);

status.textContent="Aligning + stacking...";

let base=frames[0].img;
let out=ctx.createImageData(W,H);

for(let item of frames){

 let shift=findShift(base,item.img);

 for(let y=0;y<H;y++){
  for(let x=0;x<W;x++){

   let sx=Math.min(W-1,Math.max(0,x+shift.x));
   let sy=Math.min(H-1,Math.max(0,y+shift.y));

   let src=(sy*W+sx)*4;
   let dst=(y*W+x)*4;

   out.data[dst]+=item.img.data[src]/frames.length;
   out.data[dst+1]+=item.img.data[src+1]/frames.length;
   out.data[dst+2]+=item.img.data[src+2]/frames.length;
   out.data[dst+3]=255;
  }
 }
}

enhance(out,1.35);

ctx.putImageData(out,0,0);

status.textContent="Complete";
stats.innerHTML=
`Frames captured: 100<br>
Frames used: ${frames.length}<br>
Blur rejection: enabled<br>
Alignment: enabled`;
}

document.getElementById("capture").onclick=captureStack;

start();
</script>
</body>
</html>
