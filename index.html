<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZedAych AstroVision</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#02040a">
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;overflow:hidden}
video,canvas{position:fixed;width:100%;height:100%;object-fit:cover}
video{opacity:0}
#ui{position:fixed;top:15px;left:15px;z-index:5}
.box{background:#000b;padding:12px;border-radius:12px;color:#8de7ff}
button{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);width:80px;height:80px;border-radius:50%;border:0;background:#8de7ff}
</style>
</head>
<body>
<video id="cam" autoplay playsinline></video>
<canvas id="view"></canvas>
<div id="ui"><div class="box" id="status">Starting...</div></div>
<button id="capture"></button>

<script>
if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}
const cam=document.getElementById("cam"), canvas=document.getElementById("view"), ctx=canvas.getContext("2d",{willReadFrequently:true}), status=document.getElementById("status");
let W,H;

async function start(){
 const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920},height:{ideal:1080}}});
 cam.srcObject=stream;
 await new Promise(r=>cam.onloadedmetadata=r);
 await cam.play();
 W=cam.videoWidth;H=cam.videoHeight;
 canvas.width=W;canvas.height=H;
 status.textContent="AstroVision ready";
 preview();
}
function preview(){ctx.drawImage(cam,0,0,W,H);requestAnimationFrame(preview)}

function enhance(img){
 let d=img.data;
 for(let i=0;i<d.length;i+=4){
  for(let c=0;c<3;c++){
   let v=d[i+c]/255;
   d[i+c]=Math.min(255,Math.pow(v,.65)*255*1.15);
  }
 }
 return img;
}

async function capture(){
 let frames=[],count=40;
 for(let i=0;i<count;i++){
  status.textContent="Capturing "+(i+1)+"/"+count;
  let t=document.createElement("canvas");
  t.width=W/2;t.height=H/2;
  let tc=t.getContext("2d");
  tc.drawImage(cam,0,0,t.width,t.height);
  frames.push(tc.getImageData(0,0,t.width,t.height));
  await new Promise(r=>setTimeout(r,50));
 }
 status.textContent="Stacking...";
 let w=frames[0].width,h=frames[0].height,out=ctx.createImageData(w,h);
 for(let i=0;i<out.data.length;i+=4){
  let r=0,g=0,b=0;
  frames.forEach(f=>{r+=f.data[i];g+=f.data[i+1];b+=f.data[i+2]});
  out.data[i]=r/count;out.data[i+1]=g/count;out.data[i+2]=b/count;out.data[i+3]=255;
 }
 enhance(out);
 let c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").putImageData(out,0,0);
 ctx.drawImage(c,0,0,W,H);
 status.textContent="Done - 40 frames stacked";
}
document.getElementById("capture").onclick=capture;
start();
</script>
</body>
</html>
